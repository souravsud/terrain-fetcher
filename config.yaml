# terrain-fetcher configuration file
# Run with: python main.py config.yaml

# ---------------------------------------------------------------------------
# Coordinate source  (one of: csv  OR  lat + lon)
# ---------------------------------------------------------------------------
# csv: coordinates.csv        # path to a CSV file with 'lat' and 'lon' columns
lat: 39.71121111              # single-location latitude  (used when 'csv' is not set)
lon: -7.73483333              # single-location longitude

# ---------------------------------------------------------------------------
# Run settings
# ---------------------------------------------------------------------------
output_root: out              # root folder where per-location output directories are created
start_index: 0                # starting index used for output file/folder naming

# ---------------------------------------------------------------------------
# DEM settings
# ---------------------------------------------------------------------------
dem_name: glo_30              # DEM dataset name understood by dem-stitcher
ellipsoidal_height: false     # true → request ellipsoidal heights
area_or_point: Point          # metadata tag written into output GeoTIFFs ("Area" or "Point")
side_km: 50.0                 # side length of the square extraction window in kilometres

# ---------------------------------------------------------------------------
# Roughness map settings
# ---------------------------------------------------------------------------
roughness_map: false          # true → also download and convert ESA WorldCover to z0
                              #         ETH Global Canopy Height 2020 tiles are fetched
                              #         automatically to apply the ORA model for tree pixels
                              #         and produce a co-registered displacement-height raster
worldcover_version: v100      # ESA WorldCover release tag (e.g. v100, v200)
worldcover_year: 2020         # ESA WorldCover data year
land_cover_table: GWA4        # windkit land-cover lookup table used for z0 conversion
                              # Use "custom" to load from a user-supplied CSV file instead
# custom_land_cover_table_path: landcover_roughness.csv  # only used when land_cover_table: custom
                              # defaults to landcover_roughness.csv next to this config file

# ---------------------------------------------------------------------------
# Output options
# ---------------------------------------------------------------------------
save_raw_files: true          # true → also save EPSG:4326 (raw) rasters alongside UTM output

# ---------------------------------------------------------------------------
# Debug / logging settings
# ---------------------------------------------------------------------------
verbose: true                 # true → print progress messages to stdout
show_plots: false             # true → save PNG plots of generated rasters
